[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "npm install -g pnpm@10 --force",
  "pnpm install --no-frozen-lockfile --ignore-scripts=false"
]

[phases.build]
cmds = [
  "pnpm --filter @workspace/api-server build"
]

[start]
cmd = "node --enable-source-maps artifacts/api-server/dist/index.mjs"
